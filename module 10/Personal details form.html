<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Personal Details</legend>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        <br><br>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone">
        <br><br>
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob">
        <br><br>
        <label for="gender">Gender:</label>
        <label for="male">Male</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="female">Female</label>
        <input type="radio" id="female" name="gender" value ="female">
        <label for="other">Other</label>
        <input type="radio" id="other" name="gender" value="other">
        <br><br>
        <label for="country">Hobbies:</label>
        <input type="checkbox" id="hobby1" name="hobby1" value="coding">
        <label for="hobby1">Coding</label>
        <input type="checkbox" id="hobby2" name="hobby2" value="gaming">
        <label for="hobby2">Gaming</label>  
        <input type="checkbox" id="hobby3" name="hobby3" value="traveling">
        <label for="hobby3">Traveling</label>   
        <input type="checkbox" id="hobby4" name="hobby4" value="cooking">       
        <label for="hobby4">Cooking</label>
        <input type="checkbox" id="hobby5" name="hobby5" value="sports">
        <label for="hobby5">Sports</label>
        <br><br>    
        <button type="submit">Submit</button>
        </fieldset>
    </form>
</body>
</html>
