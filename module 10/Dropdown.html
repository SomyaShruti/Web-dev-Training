<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Select in Forms</h1>
    <p>The <code>&lt;select&gt;</code> element is used to create a drop-down list in HTML forms. It allows users to choose one or more options from a list.</p>
    <form>
        <fieldset>
            <legend>Car Selection</legend>
        <label for="cars">Choose a car:</label>
        <select id="cars" name="cars">
            <option value="volvo">Volvo</option>
            <option value="saab">Saab</option>
            <option value="mercedes">Mercedes</option>
            <option value="audi">Audi</option>
            <option value="bmw">BMW</option>
            <option value="honda">Honda</option>
            <option value="toyota">Toyota</option>
            <option value="ford">Ford</option>
            <option value="chevrolet">Chevrolet</option>
        </select>
        <br><br>
        <label for="Payment method">Choose a payment method:</label>
        <select id="Payment method" name="Payment method">
            <option value="credit card">Credit Card</option>
            <option value="debit card">Debit Card</option>
            <option value="paypal">PayPal</option>
            <option value="bank transfer">Bank Transfer</option>
        </select>
        <br><br>
        <button type="submit">Submit</button>
        </fieldset> 
    </form>
</body>
</html>
