<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Tables in HTML</h1>
    <p>Tables are used to display data in a structured format. They consist of rows and columns, and can be created using the <code>&lt;table&gt;</code> tag.</p>
    <p>Here is an example of a simple table:</p>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>John</td>
            <td>25</td>
            <td>New York</td>
        </tr>
        <tr>
            <td>Jane</td>
            <td>30</td>
            <td>Los Angeles</td>
        </tr>
        <tr>
            <td>Bob</td>
            <td>35</td>
            <td>Chicago</td>
        </tr>
</body>
</html>
